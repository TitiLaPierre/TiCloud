<!DOCTYPE html>
<html lang="fr">
<head>
    <base href="/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès au compte — TiCloud</title>
    <link rel="icon" href="data:,">
    <script src="StreamSaver.js" type="text/javascript"></script>
    <script src="public/js/utils.js" type="text/javascript"></script>
    <script src="public/js/key.js" type="text/javascript"></script>
    <script src="public/js/account.js" type="text/javascript"></script>
    <script src="public/js/pages/account.js" type="text/javascript" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/web-streams-polyfill@2.0.2/dist/ponyfill.min.js"></script>
    <link rel="stylesheet" href="public/css/main.css" type="text/css">
    <link rel="stylesheet" href="public/css/account.css" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
</head>
<body>
    <div class="form">
        <h2 class="form--title">Accès au compte</h2>
        <p class="form--error" id="error--tag" style="display: none;">
            <span class="material-symbols-rounded">error</span>
            <span id="error--tag--content"></span>
        </p>
        <div class="form--field">
            <label class="form--label" for="username--input">Nom d'utilisateur</label>
            <input class="form--input" type="text" placeholder="Nom d'utilisateur" id="username--input" />
        </div>
        <div class="form--field">
            <label class="form--label" for="password--input">Mot de passe</label>
            <p class="form--hint">
                Il est impossible de récupérer vos données si vous perdez votre mot de passe.
            </p>
            <input class="form--input" type="password" placeholder="Mot de passe" id="password--input" />
        </div>
        <div class="form--actions">
            <button class="form--button" id="register--button">Créer un compte</button>
            <button class="form--button" id="login--button">Se connecter</button>
        </div>
    </div>
</body>
</html>
