<body>
<h1>Récupération des fichiers...</h1>
</body>
<script>
    (async () => {
        const element = document.querySelector("h1")
        const files = await get_files()
        let i = 0
        for (const file of files) {
            i++
            element.textContent = `Suppression du fichier ${i}/${files.length}`
            await delete_file(file.id)
        }
        element.textContent = "Tous les fichiers ont été supprimés."
    })()
</script>
