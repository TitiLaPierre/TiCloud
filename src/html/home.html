<!DOCTYPE html>
<html lang="fr">
<head>
    <base href="/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes fichiers — Cloud</title>
    <link rel="icon" href="data:,">
    <script src="public/js/utils.js" type="text/javascript"></script>
    <script src="public/js/key.js" type="text/javascript"></script>
    <script src="public/js/account.js" type="text/javascript"></script>
    <script src="public/js/upload.js" type="text/javascript"></script>
    <script src="public/js/pages/home.js" type="text/javascript" defer></script>
    <link rel="stylesheet" href="public/css/main.css" type="text/css">
    <link rel="stylesheet" href="public/css/home.css" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
</head>
<body>
    <nav class="nav">
        <h3 class="nav--title">Mes Fichiers</h3>
        <button class="nav--button" id="logout--button">Se déconnecter</button>
    </nav>
    <div class="files" id="files"></div>
    <div class="popup">
        <input type="file" id="file--input" style="display: none;" multiple />
        <div class="popup--content">
            <h3 class="popup--title">Envoyer un fichier</h3>
            <p class="popup--text">Sélectionner un fichier à envoyer.</p>
        </div>
        <div class="popup--content popup--list" id="file--list"></div>
        <button class="popup--close" id="file--close" style="display: none;">
            Réduire
            <span class="material-symbols-rounded">collapse_all</span>
        </button>
        <label class="popup--button" for="file--input">Ajouter un fichier</label>
    </div>
</body>
</html>
