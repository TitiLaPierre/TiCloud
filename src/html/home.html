<!DOCTYPE html>
<html lang="fr">
<head>
    <base href="/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes fichiers — TiCloud</title>
    <link rel="icon" href="data:,">
    <script src="StreamSaver.js" type="text/javascript"></script>
    <script src="public/js/utils.js" type="text/javascript"></script>
    <script src="public/js/images.js" type="text/javascript"></script>
    <script src="public/js/key.js" type="text/javascript"></script>
    <script src="public/js/account.js" type="text/javascript"></script>
    <script src="public/js/upload.js" type="text/javascript"></script>
    <script src="public/js/download.js" type="text/javascript"></script>
    <script src="public/js/pages/home.js" type="text/javascript" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/web-streams-polyfill@2.0.2/dist/ponyfill.min.js"></script>
    <link rel="stylesheet" href="public/css/main.css" type="text/css">
    <link rel="stylesheet" href="public/css/home.css" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
</head>
<body>
    <div class="header">
        <div class="header--content">
            <div class="header--group">
                <h1 class="header--title">TiCloud</h1>
                <hr class="header--line">
                <label class="header--label" for="expandable--header">
                    <span class="material-symbols-rounded" id="upload--label--icon">cloud</span>
                    <span id="upload--label--text">Aucun transfert en cours</span>
                </label>
            </div>
            <div class="header--links">
                <label class="header--link" for="upload--input">Envoyer un fichier</label>
                <button class="header--link" id="logout--button">Se déconnecter</button>
            </div>
        </div>
        <input type="checkbox" id="expandable--header" style="display: none;">
        <div class="header--expandable">
            <input type="file" id="upload--input" style="display: none;" multiple accept="*/*">
            <div class="header--group">
                <h3 class="header--subtitle">File d'attente</h3>
                <label class="header--button" for="upload--input">Ajouter un fichier</label>
            </div>
            <p class="header--label" id="upload--empty">Rien à afficher ici</p>
            <div class="header--list" id="upload--list"></div>
        </div>
        <label class="header--expand" for="expandable--header">
            <span class="material-symbols-rounded">expand_more</span>
        </label>
    </div>
    <div class="page">
        <nav class="nav">
            <h3 class="nav--title">Mes Fichiers</h3>
        </nav>
        <div class="files" id="files"></div>
    </div>
    <div class="actions" id="actions" style="display: none;">
        <button class="action" id="action--download">
            <span class="material-symbols-rounded">download</span>
            Télécharger
        </button>
        <button class="action" id="action--delete">
            <span class="material-symbols-rounded">delete</span>
            Supprimer
        </button>
    </div>
</body>
</html>
